name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  fmt:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - name: Check formatting
        run: cargo fmt --all -- --check

  clippy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-wasip1
          components: clippy
      - name: Clippy
        run: cargo clippy -p vzglyd -p vzglyd-slide -p vzglyd-sidecar -- -D warnings

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-wasip1
          components: clippy
      - name: Build engine (no example slides)
        run: cargo build -p vzglyd
      - name: Run tests (no example slides)
        run: cargo test -p vzglyd -p vzglyd-slide
      - name: Check vzglyd-slide docs
        run: cargo doc -p vzglyd-slide --no-deps
      - name: Check vzglyd-sidecar docs
        run: cargo doc -p vzglyd-sidecar --no-deps
      - name: Check publish targets
        run: |
          cargo check -p vzglyd-slide --target wasm32-wasip1
          cargo check -p vzglyd-sidecar --target wasm32-wasip1

  msrv:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.85"
          targets: wasm32-wasip1
      - name: Check MSRV
        run: cargo check -p vzglyd -p vzglyd-slide -p vzglyd-sidecar

  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: rustsec/audit-check@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

  test-example-slides:
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-wasip1
      - name: Build workspace with example slides
        run: cargo build --features example-slides
      - name: Run all tests with example slides
        run: cargo test --workspace --features example-slides
